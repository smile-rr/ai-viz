name: Daily Data Pipeline

on:
  schedule:
    # Weekdays, Beijing 18:00 (UTC 10:00) — after A-share market close
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run daily pipeline
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: uv run python -m src.pipeline.daily

      - name: Copy aggregated data to frontend
        run: |
          mkdir -p frontend/public/data
          cp -r data/aggregated/* frontend/public/data/ 2>/dev/null || true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aggregated/ data/quality/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push
